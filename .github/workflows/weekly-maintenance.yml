# Weekly Maintenance Workflow
# Consolidated umbrella for low-frequency maintenance:
#   - AVM module index refresh         (refresh-avm-module-index)
#   - Azure deprecation tracking       (track-deprecations)
#   - Quarterly docs / orphan audit    (docs-freshness)
#   - Drawio MCP + icon converter      (drawio-mcp-tests, drawio-icon-converter-tests)
#   - Weekly docs link safety net      (link-check)
# Replaces standalone azure-deprecation-tracker.yml (folded Aug 2025) and the
# standalone weekly cron of link-check.yml (folded May 2026).
# Some jobs open PRs (data refresh); others fail loudly or open issues.

name: Weekly Maintenance

on:
  schedule:
    # Run weekly on Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      create_issue:
        description: "Create GitHub issues for findings (audit jobs only)"
        required: false
        default: true
        type: boolean
      force_update:
        description: "Force PR creation for refresh jobs even when no changes"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Disable lefthook hooks on the runner — `npm ci` triggers the `prepare`
# script (`lefthook install`), which registers a pre-commit hook that calls
# `gitleaks`. gitleaks is not installed on the GitHub-hosted runner, so any
# automated `git commit` (e.g. peter-evans/create-pull-request) fails with
# `gitleaks: not found`. Secrets scanning still runs on every PR via ci.yml.
env:
  LEFTHOOK: "0"

# Default permissions are read-only with issue-creation for audit jobs.
# PR-creating jobs (refresh-avm-module-index, track-deprecations) declare
# their own elevated permissions block.
permissions:
  contents: read
  issues: write

jobs:
  refresh-avm-module-index:
    name: Refresh AVM Module Index
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Refresh AVM module index + version cache
        run: npm run refresh:avm-module-index

      - name: Detect changes
        id: changes
        run: |
          git add .github/data/avm-bicep-modules.csv \
                  .github/data/avm-terraform-modules.csv \
                  .github/data/avm-module-index.json \
                  tools/scripts/_data/avm-module-cache.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_update == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): Refresh AVM module index + version cache"
          branch: "chore/avm-module-index-refresh"
          delete-branch: true
          title: "chore(data): Refresh AVM module index + version cache"
          body: |
            Automated refresh of the canonical AVM module index and the
            per-module version cache that backs `validate:avm-versions:freeze`.

            Source CSVs:
            - https://azure.github.io/Azure-Verified-Modules/module-indexes/BicepResourceModules.csv
            - https://azure.github.io/Azure-Verified-Modules/module-indexes/TerraformResourceModules.csv

            Generated by `Weekly Maintenance / refresh-avm-module-index` job.
          labels: |
            automation
            avm-versions

      # Auto-merge is intentionally NOT enabled: GitHub Free private repos
      # do not support `gh pr merge --auto`. The refresh PR stays open for
      # a human review + manual merge. See workflows/README.md.
      - name: Log PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          echo "✅ Opened/updated PR #${{ steps.cpr.outputs.pull-request-number }} — manual review + merge required."
          echo "🔗 ${{ steps.cpr.outputs.pull-request-url }}"

  track-deprecations:
    name: Track Azure Deprecations
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Create data directory
        run: mkdir -p .github/data

      - name: Fetch Azure deprecation feed
        run: node tools/scripts/fetch-azure-deprecations.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changes
        id: changes
        run: |
          git add .github/data/azure-deprecations.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_update == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): Update Azure deprecation tracking"
          branch: "chore/azure-deprecation-tracker"
          delete-branch: true
          title: "chore(data): Update Azure deprecation tracking"
          body: |
            Automated update of `.github/data/azure-deprecations.json` from Azure Updates RSS.

            Generated by `Weekly Maintenance / track-deprecations` job
            (folded in from the retired azure-deprecation-tracker.yml).
          labels: |
            automation
            dependencies

      # Auto-merge is intentionally NOT enabled — see refresh-avm-module-index above.
      - name: Log PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          echo "✅ Opened/updated PR #${{ steps.cpr.outputs.pull-request-number }} — manual review + merge required."
          echo "🔗 ${{ steps.cpr.outputs.pull-request-url }}"

      - name: Log deprecation summary
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "📋 Deprecation data updated"
          jq '.totalCount, .lastUpdated' .github/data/azure-deprecations.json

  docs-freshness:
    name: Quarterly Audit (glob, orphans, freshness)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Run quarterly audit (glob-audit + orphan-content + docs-freshness)
        id: freshness
        run: |
          npm run audit:quarterly 2>&1 | tee freshness-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Create issue for audit failures
        if: steps.freshness.outputs.exit_code != '0' && github.event.inputs.create_issue != 'false'
        run: |
          BODY=$(cat freshness-output.txt)
          {
            echo "## Quarterly Audit Failed"
            echo ""
            echo "The weekly run of \`npm run audit:quarterly\` found issues. This"
            echo "aggregates three checkers: \`lint:glob-audit\`, \`lint:orphaned-content\`,"
            echo "and \`lint:docs-freshness\`."
            echo ""
            echo '```'
            echo "$BODY"
            echo '```'
            echo ""
            echo "**Action required**: Review the findings above and address"
            echo "stale documentation, orphan content, or glob drift."
            echo ""
            echo 'Run `npm run audit:quarterly` locally to reproduce.'
          } > issue-body.md
          gh issue create \
            --title "Quarterly audit: issues detected ($(date +%Y-%m-%d))" \
            --body-file issue-body.md \
            --label "documentation,maintenance"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  drawio-mcp-tests:
    name: Drawio MCP Tests (Deno)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run drawio MCP test suite
        run: npm run test:drawio-mcp

  drawio-icon-converter-tests:
    name: Drawio Icon Converter Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Run icon converter tests
        run: npm run test:convert-drawio-icons

  link-check:
    # Folded in from the retired weekly cron of link-check.yml (May 2026).
    # link-check.yml still runs on PR/push for docs paths — this job is the
    # safety net that catches external link rot between docs edits.
    name: Check docs links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Check links in docs/
        run: npm run lint:links:docs
